# =====================================================
# VIPJoinPlus Configuration
# Player-facing messages live in the lang/ folder (one file per language).
# =====================================================

behavior:
  # Message formatting engine used for join/quit and command messages.
  #
  # - MINI_MESSAGE: Recommended. Gradients, hover/click, hex (<#RRGGBB>) and more.
  #   Build messages here: https://webui.advntr.dev/
  # - LEGACY: Traditional ampersand codes (&a, &l) plus &#RRGGBB hex.
  # - MIXED: Accepts both legacy codes and MiniMessage tags.
  message-formatter-mode: "MINI_MESSAGE"

  # Set to true to hide the default Minecraft join message.
  disable-vanilla-join-message: true

  # Set to true to hide the default Minecraft quit message.
  disable-vanilla-quit-message: true

  # Delay before sending the join message, in ticks (20 ticks = 1 second).
  join-message-delay: 0

  # Delay before sending the quit message, in ticks.
  quit-message-delay: 0

  # Set to true to process join/quit messages asynchronously.
  # This can improve performance on busy servers, but messages may appear slightly delayed.
  async-enabled: false

language:
  # Default language id, used when a player's client language has no matching file in lang/.
  # Must match one of the lang/<id>.yml files (without the .yml extension).
  default: 'en'

groups:
  # Groups are matched by permission. If `permission` is not set, it defaults to
  # `group.<group_name>` (e.g. `vip` -> `group.vip`). When a player matches several
  # groups, the one with the highest `priority` wins.
  #
  # The join/quit text for each group lives in the lang/<locale>.yml files under
  # groups.<group_name>.join / groups.<group_name>.quit, so every online player sees
  # the message in their own client language. Leave a message empty there to send nothing.
  vip:
    priority: 1
    permission: "group.vip"

  default:
    priority: 0

# Verbose debug logging to the console (group matching, message delivery, reloads).
# Turn this on to diagnose behaviour, then turn it back off.
debug: false
